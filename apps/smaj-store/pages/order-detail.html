<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | SMAJ STORE</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .order-header { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; display: flex; justify-content: space-between; }
        .order-id { font-size: 20px; font-weight: 700; }
        .order-status { padding: 8px 16px; background: rgba(16,185,129,0.1); color: var(--success-color); border-radius: var(--radius-full); font-weight: 600; }
        .order-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .order-card { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
        .product-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .product-item img { width: 80px; height: 80px; border-radius: var(--radius-md); object-fit: cover; }
    </style>
</head>
<body>
    <header class="ecosystem-header">
        <div class="header-left">
            <a href="orders.html" class="back-to-hub"><i class="fas fa-arrow-left"></i><span>Back</span></a>
            <div class="store-logo"><img src="../assets/images/logo.png" alt="Pi Hub logo"></div>
        </div>
    </header>
    <div class="page-container">
        <div class="order-header">
            <div><div class="order-id">Order #SMAJ-ABC123</div><p style="color:var(--text-secondary)">Feb 20, 2026</p></div>
            <div class="order-status"><i class="fas fa-check-circle"></i> Delivered</div>
        </div>
        <div class="order-grid">
            <div class="order-card">
                <h3>Items</h3>
                <div class="product-item">
                    <img src="https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=100" alt="Product">
                    <div><h4>Wireless Earbuds Pro</h4><p>Seller: TechZone Store</p><p>1 Ã— 49.99 Pi</p></div>
                </div>
            </div>
            <div class="order-card">
                <h3>Summary</h3>
                <p>Subtotal: 49.99 Pi</p>
                <p>Shipping: 5.00 Pi</p>
                <p><strong>Total: 54.99 Pi</strong></p>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
