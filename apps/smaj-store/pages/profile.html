<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | SMAJ STORE</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .profile-header { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
        .profile-avatar-lg { width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-white); font-size: 36px; font-weight: 700; }
        .profile-info h2 { font-size: 24px; margin-bottom: 4px; }
        .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
        .profile-card { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; }
        .profile-card h3 { font-size: 18px; margin-bottom: 16px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-md); color: var(--text-secondary); cursor: pointer; margin-bottom: 4px; }
        .menu-item:hover, .menu-item.active { background: var(--bg-gray); color: var(--primary-color); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
    </style>
</head>
<body>
    <header class="ecosystem-header">
        <div class="header-left">
            <a href="../index.html" class="back-to-hub"><i class="fas fa-arrow-left"></i><span>Back</span></a>
            <div class="store-logo"><img src="../assets/images/logo.png" alt="Pi Hub logo"></div>
        </div>
        <div class="header-right">
            <a href="cart.html" class="header-icon cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-count">0</span></a>
        </div>
    </header>
    <div class="page-container">
        <div class="profile-header">
            <div class="profile-avatar-lg">JD</div>
            <div class="profile-info">
                <h2>John Doe</h2>
                <p>john.doe@example.com</p>
                <p style="margin-top:8px"><span class="verified-badge"><i class="fas fa-check"></i> KYC Verified</span></p>
            </div>
        </div>
        <div class="profile-grid">
            <div class="profile-card">
                <h3>Menu</h3>
                <div class="menu-item active"><i class="fas fa-user"></i> My Profile</div>
                <div class="menu-item"><i class="fas fa-box"></i> My Orders</div>
                <div class="menu-item"><i class="fas fa-heart"></i> Wishlist</div>
                <div class="menu-item"><i class="fas fa-map-marker-alt"></i> Addresses</div>
            </div>
            <div class="profile-card">
                <h3>Edit Profile</h3>
                <form>
                    <div class="form-group"><label>Full Name</label><input type="text" value="John Doe"></div>
                    <div class="form-group"><label>Email</label><input type="email" value="john.doe@example.com"></div>
                    <div class="form-group"><label>Phone</label><input type="tel" value="+1 234 567 8900"></div>
                    <button type="button" class="btn btn-primary" onclick="showNotification('Profile updated!','success')">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
