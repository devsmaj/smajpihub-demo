 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | SMAJ STORE</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .orders-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .orders-header h2 { font-size: 24px; font-weight: 700; }
        .order-card { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); margin-bottom: 20px; overflow: hidden; }
        .order-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--bg-gray); }
        .order-id { font-weight: 600; font-size: 16px; }
        .order-date { font-size: 14px; color: var(--text-secondary); }
        .order-status { padding: 6px 12px; border-radius: var(--radius-full); font-size: 13px; font-weight: 600; }
        .status-payment_confirmed { background: rgba(59, 130, 246, 0.1); color: var(--info-color); }
        .status-processing { background: rgba(245, 158, 11, 0.1); color: var(--warning-color); }
        .status-shipped { background: rgba(99, 102, 241, 0.1); color: var(--primary-color); }
        .status-delivered { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .order-body { padding: 20px; }
        .order-items { display: flex; flex-direction: column; gap: 12px; }
        .order-item { display: flex; gap: 16px; align-items: center; }
        .order-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-md); }
        .order-item-info { flex: 1; }
        .order-item-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .order-item-info span { font-size: 13px; color: var(--text-secondary); }
        .order-item-price { font-weight: 600; color: var(--primary-color); }
        .order-footer { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-top: 1px solid var(--border-color); }
        .order-total { font-size: 18px; font-weight: 700; }
        .order-total span { color: var(--primary-color); }
        .btn-track { padding: 10px 20px; background: var(--primary-color); color: var(--text-white); border-radius: var(--radius-md); font-weight: 600; font-size: 14px; }
        .empty-orders { text-align: center; padding: 80px 20px; }
        .empty-orders i { font-size: 64px; color: var(--text-light); margin-bottom: 24px; }
        .empty-orders h3 { font-size: 24px; margin-bottom: 12px; }
        .empty-orders p { color: var(--text-secondary); margin-bottom: 24px; }
    </style>
</head>
<body>
    <header class="ecosystem-header">
        <div class="header-left">
            <a href="../index.html" class="back-to-hub"><i class="fas fa-arrow-left"></i><span>Back to PI HUB</span></a>
            <div class="store-logo"><img src="../assets/images/logo.png" alt="Pi Hub logo"></div>
        <div class="header-right">
            <div class="wallet-status" id="walletStatus">
                <span class="wallet-text" onclick="toggleWalletDropdown()"><i class="fas fa-wallet"></i><span class="wallet-text-label">PI HUB Account</span>
                <div class="wallet-dropdown" id="walletDropdown">
                    <div class="wallet-info" id="walletInfo" style="display:none"><div class="wallet-balance"><span class="balance-label">Balance</span><span class="balance-amount" id="walletBalance">0.00 Pi</span></div><button class="disconnect-btn" onclick="disconnectWallet()">Disconnect</button></div>
                    <button class="connect-btn" onclick="connectWallet()">Open PI HUB</button>
                </div>
            <a href="cart.html" class="header-icon cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></a>
            <div class="user-profile" onclick="toggleProfileMenu()"><div class="profile-avatar"><i class="fas fa-user"></i></div>
        </div>
    </header>

    <div class="page-container">
        <div class="orders-header">
            <h2>My Orders</h2>
        </div>
        
        <div id="ordersList"></div>
        
        <div class="empty-orders" id="emptyOrders" style="display:none">
            <i class="fas fa-box-open"></i>
            <h3>No Orders Yet</h3>
            <p>You haven't placed any orders yet. Start shopping to see your orders here.</p>
            <a href="../index.html" class="btn btn-primary">Start Shopping</a>
        </div>

    <script src="../js/products.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkEcosystemSession();
            loadOrders();
        });
        
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('smaj_orders') || '[]');
            const container = document.getElementById('ordersList');
            const emptyDiv = document.getElementById('emptyOrders');
            
            if (orders.length === 0) {
                container.style.display = 'none';
                emptyDiv.style.display = 'block';
                return;
            }
            
            container.innerHTML = orders.reverse().map(order => {
                const date = new Date(order.date).toLocaleDateString();
                const statusClass = 'status-' + order.status;
                const statusText = order.status.replace('_', ' ').toUpperCase();
                
                return `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">${order.id}</div>
                            <div class="order-date">${date}</div>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <img src="${item.image}" class="order-item-img">
                                    <div class="order-item-info">
                                        <h4>${item.name}</h4>
                                        <span>Qty: ${item.quantity}</span>
                                    </div>
                                    <div class="order-item-price">${(item.price * item.quantity).toFixed(2)} Pi</div>
                            `).join('')}
                        </div>
                    <div class="order-footer">
                        <div class="order-total">Total: <span>${order.total.toFixed(2)} Pi</span></div>
                        <a href="order-tracking.html?order=${order.id}" class="btn-track"><i class="fas fa-map-marker-alt"></i> Track Order</a>
                    </div>
                `;
            }).join('');
        }
    </script>
    <script src="../js/pi-rate.js"></script>
</body>
</html>
