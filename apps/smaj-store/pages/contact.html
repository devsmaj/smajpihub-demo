<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SMAJ STORE</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .contact-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 32px; }
        .contact-info { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 32px; }
        .info-item { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
        .info-item i { width: 40px; height: 40px; background: rgba(99,102,241,0.1); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--primary-color); }
        .info-item h4 { margin-bottom: 4px; }
        .info-item p { font-size: 14px; color: var(--text-secondary); }
        .contact-form { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-size: 14px; }
        @media (max-width:768px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="ecosystem-header">
        <div class="header-left">
            <a href="../index.html" class="back-to-hub"><i class="fas fa-arrow-left"></i><span>Back</span></a>
            <div class="store-logo"><img src="../assets/images/logo.png" alt="Pi Hub logo"></div>
        </div>
    </header>
    <div class="page-container">
        <h2 style="margin-bottom:24px">Contact Us</h2>
        <div class="contact-grid">
            <div class="contact-info">
                <div class="info-item"><i class="fas fa-envelope"></i><div><h4>Email</h4><p>support@smajstore.com</p></div></div>
                <div class="info-item"><i class="fas fa-phone"></i><div><h4>Phone</h4><p>+1 234 567 8900</p></div></div>
                <div class="info-item"><i class="fas fa-map-marker-alt"></i><div><h4>Address</h4><p>123 Crypto Street, Tech City</p></div></div>
                <div class="info-item"><i class="fas fa-clock"></i><div><h4>Hours</h4><p>Mon-Fri: 9AM - 6PM</p></div></div>
            </div>
            <div class="contact-form">
                <form>
                    <div class="form-group"><label>Your Name</label><input type="text" placeholder="Enter your name"></div>
                    <div class="form-group"><label>Email</label><input type="email" placeholder="Enter your email"></div>
                    <div class="form-group"><label>Subject</label><select><option>General Inquiry</option><option>Order Issue</option><option>Payment Help</option><option>Seller Support</option></select></div>
                    <div class="form-group"><label>Message</label><textarea rows="5" placeholder="How can we help?"></textarea></div>
                    <button type="button" class="btn btn-primary" onclick="showNotification('Message sent!','success')">Send Message</button>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
