<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAJ STORE | Vendor Storefront</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/store.css">
</head>
<body data-page="store-vendor">
  <header class="store-topbar">
    <div class="store-shell store-topbar-inner">
      <a class="store-brand" href="index.html">
        <span class="store-brand-mark">S</span>
        <span>
          <strong>SMAJ STORE</strong>
          <small>Vendor storefront</small>
        </span>
      </a>
      <nav class="store-nav" aria-label="Store">
        <a href="../index.html">Back to Hub</a>
        <a href="index.html">Home</a>
        <a href="category.html">Categories</a>
        <a href="wishlist.html">Wishlist <span id="storeWishlistCount" class="cart-badge">0</span></a>
        <a href="vendor.html" aria-current="page">Vendors</a>
        <a href="vendor-dashboard.html">Vendor Dashboard</a>
        <a href="cart.html">Cart <span id="storeCartCount" class="cart-badge">0</span></a>
      </nav>
      <div id="storeSessionChip" class="session-chip">Checking session...</div>
    </div>
  </header>

  <main class="store-shell">
    <section id="vendorHero" class="vendor-hero"></section>
    <section class="section-block">
      <div class="section-head">
        <div>
          <span class="eyebrow">Vendor Listings</span>
          <h2>Products from this storefront</h2>
        </div>
      </div>
      <div id="vendorProductsGrid" class="vendor-product-grid"></div>
    </section>
  </main>

  <footer class="store-footer">
    <div class="store-shell footer-row">
      <div>
        <strong>SMAJ STORE</strong>
        <p>Verified seller discovery inside one commerce module.</p>
      </div>
      <div class="footer-links">
        <a href="vendor-dashboard.html">Vendor Dashboard</a>
        <a href="add-product.html">Add Product</a>
        <a href="../index.html">Hub</a>
      </div>
    </div>
  </footer>

  <script src="./js/store-data.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/store-vendor.js"></script>
</body>
</html>
