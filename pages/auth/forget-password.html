<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - SMAJ PI HUB</title>

  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/auth.css">

  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/responsive.css">

<body>

  <header class="header">
    <div class="container nav">
      <div class="logo">
        <img src="../../assets/images/logo.png" alt="SMAJ PI HUB Logo">
      </div>
    </div>
  </header>

  <main class="auth-container">
    <form class="auth-box" id="forgotForm">
      <h1>Forgot Password</h1>
      <p>Enter your email to receive a password reset link.</p>

      <div class="input-group">
        <i class='bx bx-envelope'></i>
        <input type="email" id="email" placeholder="Email address" required>
      </div>

      <button type="submit" class="auth-btn">Send Reset Link</button>

      <div class="auth-links">
        <a href="login.html">Back to Login</a>
      </div>

      <p class="success-msg" id="successMsg"></p>
    </form>
  </main>

  <footer class="footer">
    <div class="container footer-grid">

      <div>
        <h4>SMAJ PI HUB</h4>
        <p>All services are priced in Pi. No fake promises. Real utility.</p>
      </div>

      <div>
        <h4>Follow Us</h4>
        <div class="socials">
          <a href="https://x.com/smajpihub" aria-label="Twitter" target="_blank" rel="noopener noreferrer"><i class='bx bxl-twitter'></i></a>
          <a href="https://t.me/smajpihub" aria-label="Telegram" target="_blank" rel="noopener noreferrer"><i class='bx bxl-telegram'></i></a>
          <a href="https://facebook.com/smajpihub" aria-label="Facebook" target="_blank" rel="noopener noreferrer"><i class='bx bxl-facebook'></i></a>
          <a href="https://instagram.com/smajpihub" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><i class='bx bxl-instagram'></i></a>
          <a href="https://youtube.com/@smajpihub" aria-label="YouTube" target="_blank" rel="noopener noreferrer"><i class='bx bxl-youtube'></i></a>
          <a href="https://tiktok.com/@smajpihub" aria-label="TikTok" target="_blank" rel="noopener noreferrer"><i class='bx bxl-tiktok'></i></a>
        </div>
      </div>

</html>
