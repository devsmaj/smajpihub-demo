<!DOCTYPE html>
<html lang="en">

<head>

  <title>Create Account | SMAJ PI HUB</title>

  <!-- Boxicons -->

  <!-- Global CSS -->
  <link rel="stylesheet" href="../../css/auth.css">

      <div class="auth-links">
        <a href="login.html">Already have an account? Login with Pi Wallet</a>

  <!-- FOOTER -->

      <div>
