<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAJ STORE | Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/store.css">
</head>
<body data-page="store-cart">
  <header class="store-topbar">
    <div class="store-shell store-topbar-inner">
      <a class="store-brand" href="index.html">
        <span class="store-brand-mark">S</span>
        <span>
          <strong>SMAJ STORE</strong>
          <small>Cart</small>
        </span>
      </a>
      <nav class="store-nav" aria-label="Store">
        <a href="../../index.html">Back to Hub</a>
        <a href="index.html">Home</a>
        <a href="category.html">Categories</a>
        <a href="orders.html">My Orders</a>
        <a href="cart.html" aria-current="page">Cart <span id="storeCartCount" class="cart-badge">0</span></a>
      </nav>
      <div id="storeSessionChip" class="session-chip">Checking session...</div>
    </div>
  </header>

  <main class="store-shell cart-layout">
    <section>
      <div class="section-head">
        <div>
          <span class="eyebrow">Cart</span>
          <h1>Your active basket</h1>
        </div>
      </div>
      <div id="cartItemsWrap" class="cart-list"></div>
    </section>

    <aside id="cartSummary" class="summary-card"></aside>
  </main>

  <footer class="store-footer">
    <div class="store-shell footer-row">
      <div>
        <strong>SMAJ STORE</strong>
        <p>Shared wallet checkout begins here.</p>
      </div>
      <div class="footer-links">
        <a href="category.html">Continue Shopping</a>
        <a href="checkout.html">Checkout</a>
        <a href="orders.html">Orders</a>
      </div>
    </div>
  </footer>

  <script src="../../js/store-data.js"></script>
  <script src="../../js/store.js"></script>
  <script src="../../js/store-cart.js"></script>
</body>
</html>
